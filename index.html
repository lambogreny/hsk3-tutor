// shared document lightbox with ZOOM + red circle on the target word
function DocDialog({page, open, onClose, highlightZh, wordN}){
  const bb = wordN ? BBOX[String(wordN)] : null;
  // initial zoom: if a word is targeted, zoom in to ~3.4x centered on it; else full page
  const [z, setZ] = useState(bb ? 3.4 : 1);
  const [origin, setOrigin] = useState(bb ? {x: bb.x + bb.w/2, y: bb.y + bb.h/2} : {x:50, y:25});
  useEffect(()=>{
    if(bb){ setZ(3.4); setOrigin({x: bb.x + bb.w/2, y: bb.y + bb.h/2}); }
    else { setZ(1); setOrigin({x:50, y:18}); }
  },[wordN, page]);
  const p = String(page).padStart(2,'0');
  const clamp=(v)=>Math.max(1, Math.min(6, v));
  return e(Dialog,{open:open, onClose:onClose, maxWidth:'md', fullWidth:true},
    e(DialogTitle,{sx:{display:'flex', alignItems:'center', justifyContent:'space-between', pb:1}},
      e(Box,null,
        e(Typography,{variant:'h6', fontWeight:700}, 'เอกสารต้นฉบับ — หน้า '+page),
        e(Typography,{variant:'caption', color:'text.secondary'}, highlightZh? ('🔴 วงแดง = คำ "'+highlightZh+'" ในกระดาษจริง') : 'รายการคำศัพท์ HSK 3 ฉบับทางการ + คำแปลไทยสีแดง')
      ),
      e(Stack,{direction:'row', spacing:0.5, alignItems:'center'},
        e(Tooltip,{title:'ซูมออก'}, e(IconButton,{size:'small', onClick:()=>setZ(v=>clamp(v-0.6))}, Sym('zoom_out',22))),
        e(Typography,{variant:'caption', sx:{width:34, textAlign:'center'}}, Math.round(z*100)+'%'),
        e(Tooltip,{title:'ซูมเข้า'}, e(IconButton,{size:'small', onClick:()=>setZ(v=>clamp(v+0.6))}, Sym('zoom_in',22))),
        e(Tooltip,{title: bb?'กลับไปที่คำ':'ดูเต็มหน้า'}, e(IconButton,{size:'small', onClick:()=>{ if(bb){setZ(3.4); setOrigin({x:bb.x+bb.w/2,y:bb.y+bb.h/2});} else {setZ(1); setOrigin({x:50,y:18});} }}, Sym(bb?'my_location':'fit_screen',22))),
        e(IconButton,{onClick:onClose}, Sym('close',22))
      )
    ),
    e(DialogContent,{sx:{p:0, overflow:'auto', bgcolor:'#0b1120'}},
      e(Box,{sx:{position:'relative', overflow:'hidden', width:'100%'}},
        e(Box,{sx:{transform:'scale('+z+')', transformOrigin:origin.x+'% '+origin.y+'%', transition:'transform .35s ease', position:'relative'}},
          e('img',{src:'./docs/vocab-'+p+'.png', alt:'page '+page, style:{width:'100%', display:'block'}}),
          // red ring overlay positioned over the word
          bb ? e(Box,{sx:{position:'absolute',
            left: (bb.x - bb.w*0.25) + '%', top: (bb.y - bb.h*1.1) + '%',
            width: (bb.w*1.5) + '%', height: (bb.h*3.2) + '%',
            border:'2.5px solid #dc2626', borderRadius:'40px',
            boxShadow:'0 0 0 9999px rgba(0,0,0,0.04)', pointerEvents:'none'}}) : null
        )
      )
    )
  );
}

// ---------- HOME ----------

    {n:'600', l:'คำศัพท์ครบหลักสูตร', i:'menu_book'},

    {n:'3', l:'พาร์ท ฟัง·อ่าน·เขียน', i:'headphones'},
    {n:'180', l:'คะแนนผ่าน (เต็ม 300)', i:'military_tech'},
  ];
  const feats = [
    {i:'translate', t:'คำศัพท์พร้อมคำแปลไทย', d:'ครบ 600 คำ มีพินอิน คำอ่าน และความหมายภาษาไทยทุกคำ ค้นหาง่าย'},
    {i:'forum', t:'ประโยคที่เจ้าของภาษาใช้จริง', d:'ทุกคำมีตัวอย่างประโยคจริง พร้อมพินอินและคำแปล เห็นแล้วใช้เป็น'},
    {i:'style', t:'Flashcard พลิกจำ', d:'โหมดท่องศัพท์แบบบัตรคำ พลิกดูคำแปล ฝึกความจำได้ทุกที่'},

  return e(Box,null,

      e(Chip,{color:'error', label:'จัดทำโดย Lishuli · สำนักติวภาษาจีน', sx:{mb:2, fontWeight:600}}),
      e(Typography,{variant:'h2',sx:{fontWeight:700, fontSize:{xs:34,md:54}, lineHeight:1.15}},
        'พิชิต ', e('span',{className:'cn',style:{color:'#dc2626'}},'HSK 三级'), ' ให้สอบผ่าน'),
      e(Typography,{sx:{color:'text.secondary', fontSize:{xs:16,md:20}, mt:2, maxWidth:680, mx:'auto'}},
        'คอร์สติว HSK 3 ที่ครบที่สุด — 600 คำศัพท์ ประโยคจริง ไวยากรณ์ และข้อสอบ ในที่เดียว เรียนเองได้ สอบผ่านจริง'),
      e(Stack,{direction:'row', spacing:2, justifyContent:'center', sx:{mt:4}, flexWrap:'wrap', useFlexGap:true},
        e(Button,{variant:'contained', size:'large', color:'error', startIcon:Sym('menu_book',20), onClick:()=>go('vocab')}, 'เริ่มเรียนคำศัพท์'),
        e(Button,{variant:'outlined', size:'large', startIcon:Sym('style',20), onClick:()=>go('flash')}, 'ลองเล่น Flashcard')
      )

    e(Container,{maxWidth:'lg', sx:{py:5}},

      e(Grid,{container:true, spacing:2, sx:{mb:5}},
        ...stats.map((s,i)=>e(Grid,{item:true, xs:6, md:3, key:i},
          e(Card,{variant:'outlined', sx:{textAlign:'center', py:2.5, height:'100%'}},
            e(Avatar,{sx:{bgcolor:'error.main', mx:'auto', mb:1}}, Sym(s.i,22)),
            e(Typography,{variant:'h4', fontWeight:700, color:'error.main'}, s.n),

      e(Grid,{container:true, spacing:2},
        ...feats.map((f,i)=>e(Grid,{item:true, xs:12, md:4, key:i},
          e(Card,{variant:'outlined', sx:{height:'100%'}},
            e(CardContent,null,
              e(Avatar,{variant:'rounded', sx:{bgcolor:'primary.main', mb:1.5, width:46, height:46}}, Sym(f.i,24)),
              e(Typography,{variant:'h6', fontWeight:700, gutterBottom:true}, f.t),
              e(Typography,{variant:'body2', color:'text.secondary'}, f.d)
            ))))
      ),
      e(Card,{sx:{mt:5, bgcolor:'error.main', color:'#fff', textAlign:'center'}},
        e(CardContent,{sx:{py:4}},
          e(Typography,{variant:'h5', fontWeight:700}, 'พร้อมเริ่มเส้นทางพิชิต HSK 3 แล้วหรือยัง?'),
          e(Typography,{sx:{opacity:0.9, mt:1, mb:3}}, '600 คำ + ประโยคจริง + ข้อสอบ รอคุณอยู่'),
          e(Button,{variant:'contained', size:'large', sx:{bgcolor:'#fff', color:'error.main', '&:hover':{bgcolor:'#f1f5f9'}}, onClick:()=>go('vocab')}, 'เริ่มเลย — ฟรี')

// ---------- FOCUS / PRESENTATION MODE ----------
function FocusDialog({list, idx, setIdx, onClose}){
  const d = list[idx];
  if(!d) return null;
  const go=(delta)=>setIdx(i=>(i+delta+list.length)%list.length);
  useEffect(()=>{
    const h=(ev)=>{ if(ev.key==='ArrowRight')go(1); else if(ev.key==='ArrowLeft')go(-1); else if(ev.key==='Escape')onClose(); };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h);
  },[list.length]);
  return e(Dialog,{open:true, onClose:onClose, fullScreen:true},
    e(Box,{sx:{height:'100%', display:'flex', flexDirection:'column', bgcolor:'background.default'}},
      e(Stack,{direction:'row', justifyContent:'space-between', alignItems:'center', sx:{p:2}},
        e(Chip,{label:'โหมดสอน · '+(idx+1)+'/'+list.length, color:'error'}),
        e(IconButton,{onClick:onClose, size:'large'}, Sym('close',28))
      ),
      e(Box,{sx:{flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', textAlign:'center', px:3}},
        e(Typography,{className:'cn', sx:{fontSize:{xs:120,md:200}, fontWeight:700, lineHeight:1}}, d.zh),
        e(Typography,{sx:{fontSize:{xs:34,md:48}, color:'primary.main', fontWeight:600, mt:1}}, d.py),
        e(Typography,{sx:{fontSize:{xs:26,md:36}, fontWeight:500, mt:1}}, d.th),
        d.ex_zh ? e(Box,{sx:{mt:4, p:3, bgcolor:'action.hover', borderRadius:3, maxWidth:880}},
          e(Typography,{className:'cn', sx:{fontSize:{xs:28,md:40}, fontWeight:700}}, d.ex_zh),
          e(Typography,{sx:{fontSize:{xs:18,md:24}, color:'primary.main', mt:1}}, d.ex_py),
          e(Typography,{sx:{fontSize:{xs:18,md:24}, color:'error.main', mt:0.5}}, d.ex_th)
        ) : null
      ),
      e(Stack,{direction:'row', justifyContent:'space-between', alignItems:'center', sx:{p:3}},
        e(Button,{size:'large', variant:'outlined', startIcon:Sym('chevron_left',26), onClick:()=>go(-1)}, 'ก่อนหน้า'),
        e(Typography,{variant:'caption', color:'text.secondary'}, 'ใช้ลูกศร ← → เลื่อนได้'),
        e(Button,{size:'large', variant:'contained', color:'error', endIcon:Sym('chevron_right',26), onClick:()=>go(1)}, 'คำถัดไป')
      )
    )
  );
}

// ---------- VOCAB ----------
function Vocab(){
  const [q, setQ] = useState('');
  const [page, setPage] = useState(1);
  const [docOpen, setDocOpen] = useState(null); // {page, zh}
  const [focusIdx, setFocusIdx] = useState(null); // index into `cur`
  const PER = 24;
  const filtered = useMemo(()=>{
    const s=q.trim().toLowerCase();
    if(!s) return DATA;
    return DATA.filter(d=> d.zh.includes(q) || d.py.toLowerCase().includes(s) || (d.th||'').includes(q));
  },[q]);
  const pages = Math.ceil(filtered.length/PER);
  const cur = filtered.slice((page-1)*PER, page*PER);
  useEffect(()=>{setPage(1);},[q]);
  return e(Container,{maxWidth:'lg', sx:{py:4}},
    e(Typography,{variant:'h4', fontWeight:700, gutterBottom:true}, 'คลังคำศัพท์ HSK 3'),
    e(Typography,{color:'text.secondary', sx:{mb:3}}, 'ครบ 600 คำ — มีพินอิน คำแปลไทย และประโยคตัวอย่างจริงทุกคำ'),
    e(TextField,{fullWidth:true, placeholder:'ค้นหา… (อักษรจีน / พินอิน / คำแปลไทย)', value:q,
      onChange:ev=>setQ(ev.target.value), sx:{mb:3},
      InputProps:{startAdornment:e(InputAdornment,{position:'start'}, Sym('search',22))}}),
    e(Typography,{variant:'body2', color:'text.secondary', sx:{mb:2}}, 'พบ '+filtered.length+' คำ'),
    e(Grid,{container:true, spacing:2},
      ...cur.map((d,ci)=>e(Grid,{item:true, xs:12, sm:6, md:4, key:d.n},
        e(Card,{variant:'outlined', sx:{height:'100%'}},
          e(CardContent,null,
            e(Stack,{direction:'row', justifyContent:'space-between', alignItems:'flex-start'},
              e(Tooltip,{title:'แตะเพื่อโฟกัส/สอนคำนี้เต็มจอ', arrow:true},
                e(Box,{onClick:()=>setFocusIdx(ci), sx:{cursor:'pointer', borderRadius:2, px:0.5, '&:hover':{bgcolor:'action.hover'}}},
                  e(Typography,{className:'cn', sx:{fontSize:30, fontWeight:700, lineHeight:1.1}}, d.zh),
                  e(Typography,{color:'primary.main', sx:{fontWeight:600}}, d.py)
                )),
              e(Chip,{size:'small', variant:'outlined', label:'#'+d.n})
            ),
            e(Typography,{sx:{mt:0.5, mb:1.5, fontWeight:500}}, d.th),
            d.ex_zh ? e(Box,{sx:{p:1.5, bgcolor:'action.hover', borderRadius:2}},
              e(Typography,{className:'cn', sx:{fontSize:15, fontWeight:600}}, d.ex_zh),
              e(Typography,{variant:'caption', color:'primary.main', sx:{display:'block'}}, d.ex_py),
              e(Typography,{variant:'body2', color:'error.main'}, d.ex_th)
            ) : null,
            e(Button,{size:'small', variant:'outlined', startIcon:Sym('zoom_in',16), sx:{mt:1.2, textTransform:'none'}, fullWidth:true,
              onClick:()=>setDocOpen({page:PAGE[d.n]||1, zh:d.zh, n:d.n})}, 'ดูในเอกสารจริง (ซูม+วงให้)')
          )))) ),
    docOpen ? e(DocDialog,{page:docOpen.page, highlightZh:docOpen.zh, wordN:docOpen.n, open:true, onClose:()=>setDocOpen(null)}) : null,
    focusIdx!==null ? e(FocusDialog,{list:cur, idx:focusIdx, setIdx:setFocusIdx, onClose:()=>setFocusIdx(null)}) : null,
    pages>1 ? e(Stack,{alignItems:'center', sx:{mt:4}},
      e(Pagination,{count:pages, page:page, onChange:(ev,v)=>{setPage(v); window.scrollTo(0,0);}, color:'primary'})) : null
  );
}

// ---------- FLASHCARD ----------
function Flash(){
  const [idx, setIdx] = useState(0);
  const [flip, setFlip] = useState(false);
  const [order, setOrder] = useState(()=>DATA.map((_,i)=>i));
  const d = DATA[order[idx]];
  const next=()=>{ setFlip(false); setTimeout(()=>setIdx(i=>(i+1)%order.length),120); };
  const prev=()=>{ setFlip(false); setTimeout(()=>setIdx(i=>(i-1+order.length)%order.length),120); };
  const shuffle=()=>{ const o=[...order]; for(let i=o.length-1;i>0;i--){const j=Math.floor((i*7+idx*13+3)%(i+1)); [o[i],o[j]]=[o[j],o[i]];} setOrder(o); setIdx(0); setFlip(false); };
  if(!d) return null;
  return e(Container,{maxWidth:'sm', sx:{py:4, textAlign:'center'}},
    e(Typography,{variant:'h4', fontWeight:700, gutterBottom:true}, 'Flashcard ท่องศัพท์'),
    e(Typography,{color:'text.secondary', sx:{mb:1}}, 'แตะบัตรเพื่อพลิกดูคำแปล'),
    e(LinearProgress,{variant:'determinate', value:(idx+1)/order.length*100, sx:{mb:1, height:8, borderRadius:5}}),
    e(Typography,{variant:'caption', color:'text.secondary'}, (idx+1)+' / '+order.length),
    e(Box,{className:'flip-card', sx:{mt:2, mb:3, height:340, cursor:'pointer'}, onClick:()=>setFlip(f=>!f)},
      e(Box,{className:'flip-inner'+(flip?' flipped':''), sx:{height:'100%'}},
        // front
        e(Card,{className:'flip-face', variant:'outlined', sx:{height:'100%', bgcolor:'background.paper'}},
          e(Typography,{className:'cn', sx:{fontSize:80, fontWeight:700}}, d.zh),
          e(Typography,{variant:'h5', color:'primary.main', sx:{mt:1}}, d.py),
          e(Typography,{variant:'caption', color:'text.secondary', sx:{mt:3}}, 'แตะเพื่อดูคำแปล')
        ),
        // back
        e(Card,{className:'flip-face flip-back', sx:{height:'100%', bgcolor:'error.main', color:'#fff', p:2}},
          e(Typography,{variant:'h4', fontWeight:700}, d.th),
          d.ex_zh ? e(Box,{sx:{mt:2}},
            e(Typography,{className:'cn', sx:{fontSize:20, fontWeight:600}}, d.ex_zh),
            e(Typography,{variant:'body2', sx:{opacity:0.9}}, d.ex_py),
            e(Typography,{variant:'body2', sx:{opacity:0.95, mt:0.5}}, d.ex_th)
          ) : null
        )
      )
    ),
    e(Stack,{direction:'row', spacing:1.5, justifyContent:'center'},
      e(Button,{variant:'outlined', startIcon:Sym('chevron_left',20), onClick:prev}, 'ก่อนหน้า'),
      e(Button,{variant:'outlined', startIcon:Sym('shuffle',20), onClick:shuffle}, 'สุ่ม'),
      e(Button,{variant:'contained', color:'error', endIcon:Sym('chevron_right',20), onClick:next}, 'ถัดไป')
    )
  );
}

// ---------- GRAMMAR ----------
function Grammar(){
  const items = [
    {t:'โครงสร้าง 把', sub:'จุดวัดระดับ HSK 3', zh:'我把作业做完了。', py:'Wǒ bǎ zuòyè zuò wán le.', th:'ฉันทำการบ้านเสร็จแล้ว', note:'ประธาน + 把 + กรรม + กริยา + ส่วนเสริม — เน้นว่า "จัดการ" กับกรรมอย่างไร'},

// ---------- custom audio player (pretty, MUI) ----------
function AudioPlayer({src, label}){
  const ref = React.useRef(null);
  const [playing, setPlaying] = useState(false);
  const [cur, setCur] = useState(0);
  const [dur, setDur] = useState(0);
  const [loaded, setLoaded] = useState(false);
  const fmt=(s)=>{ if(!s||isNaN(s)) return '0:00'; const m=Math.floor(s/60), x=Math.floor(s%60); return m+':'+String(x).padStart(2,'0'); };
  const toggle=()=>{ const a=ref.current; if(!a) return; if(playing){a.pause();} else {a.play();} };
  return e(Box,{sx:{display:'flex', alignItems:'center', gap:1, p:1, borderRadius:2, bgcolor:'action.hover', mt:0.5}},
    e('audio',{ref:ref, src:src, preload:'none',
      onPlay:()=>setPlaying(true), onPause:()=>setPlaying(false),
      onLoadedMetadata:ev=>{setDur(ev.target.duration); setLoaded(true);},
      onTimeUpdate:ev=>setCur(ev.target.currentTime),
      onEnded:()=>setPlaying(false)}),
    e(IconButton,{size:'small', color:'error', onClick:toggle, sx:{bgcolor:'error.main', color:'#fff', '&:hover':{bgcolor:'error.dark'}}},
      Sym(playing?'pause':'play_arrow',20)),
    e(Box,{sx:{flex:1, minWidth:0}},
      e(Stack,{direction:'row', justifyContent:'space-between', sx:{mb:0.25}},
        e(Typography,{variant:'caption', color:'text.secondary'}, label||'ไฟล์เสียงพาร์ทฟัง'),
        e(Typography,{variant:'caption', color:'text.secondary'}, fmt(cur)+' / '+(loaded?fmt(dur):'--:--'))),
      e(LinearProgress,{variant:'determinate', value: dur? (cur/dur*100):0, color:'error',
        sx:{height:6, borderRadius:5, cursor:'pointer'},
        onClick:ev=>{ const a=ref.current; if(!a||!dur) return; const r=ev.currentTarget.getBoundingClientRect(); a.currentTime=((ev.clientX-r.left)/r.width)*dur; }})
    )
  );
}

// sound via Web Audio (no files needed)
let _ac=null;
function beep(type){
  try{
    _ac = _ac || new (window.AudioContext||window.webkitAudioContext)();
    const seq = type==='ok' ? [[660,0],[880,0.09],[1175,0.18]] : [[300,0],[200,0.12]];
    seq.forEach(([f,t])=>{
      const o=_ac.createOscillator(), g=_ac.createGain();
      o.type = type==='ok'?'sine':'square'; o.frequency.value=f;
      o.connect(g); g.connect(_ac.destination);
      const s=_ac.currentTime+t;
      g.gain.setValueAtTime(0.0001,s); g.gain.exponentialRampToValueAtTime(0.18,s+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,s+0.18);
      o.start(s); o.stop(s+0.2);
    });
  }catch(e){}
}

function Quiz(){
  const [started, setStarted] = useState(false);
  const [count, setCount] = useState(10);
  const [round, setRound] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [done, setDone] = useState(false);
  const [picked, setPicked] = useState(null);
  const [fx, setFx] = useState(null); // 'ok' | 'no'
  const [seed, setSeed] = useState(0);
  const TOTAL = count;
  const rint = (m)=>Math.floor(Math.random()*m);
  const quiz = useMemo(()=>{
    const pool=[...DATA]; const qs=[];
    const used=new Set();
    while(used.size<TOTAL && used.size<pool.length){ used.add(rint(pool.length)); }
    [...used].forEach(ci=>{
      const correct = pool[ci];
      const opts=[correct];
      while(opts.length<4){ const c=pool[rint(pool.length)]; if(!opts.find(o=>o.n===c.n)) opts.push(c); }
      for(let k=opts.length-1;k>0;k--){const j=rint(k+1);[opts[k],opts[j]]=[opts[j],opts[k]];}
      qs.push({correct, opts});
    });
    for(let k=qs.length-1;k>0;k--){const j=rint(k+1);[qs[k],qs[j]]=[qs[j],qs[k]];}
    return qs;
  },[seed, count]);

  // START SCREEN — choose number of questions
  if(!started){
    return e(Container,{maxWidth:'sm', sx:{py:6, textAlign:'center'}},
      e(Avatar,{sx:{bgcolor:'error.main', width:72, height:72, mx:'auto', mb:2}}, Sym('quiz',38)),
      e(Typography,{variant:'h4', fontWeight:700}, 'แบบทดสอบคำศัพท์'),
      e(Typography,{color:'text.secondary', sx:{mb:3}}, 'เลือกจำนวนข้อ แล้วเริ่มได้เลย — สุ่มข้อใหม่ทุกครั้ง'),
      e(Typography,{variant:'subtitle2', sx:{mb:1}}, 'เลือกจำนวนข้อ (ปุ่มลัด)'),
      e(ToggleButtonGroup,{exclusive:true, value:[10,20,30,50].includes(count)?count:null, onChange:(ev,v)=>v&&setCount(v), color:'error', sx:{mb:2}},
        ...[10,20,30,50].map(n=>e(ToggleButton,{key:n, value:n, sx:{px:3, fontWeight:700}}, n))),
      e(Typography,{variant:'subtitle2', sx:{mb:1, mt:1}}, 'หรือพิมพ์จำนวนเอง (1–600)'),
      e(TextField,{type:'number', value:count, size:'small', sx:{mb:4, width:160},
        inputProps:{min:1, max:600, style:{textAlign:'center', fontWeight:700, fontSize:18}},
        onChange:ev=>{ let v=parseInt(ev.target.value||'0'); if(isNaN(v))v=0; v=Math.max(1,Math.min(600,v)); setCount(v); },
        InputProps:{endAdornment:e(InputAdornment,{position:'end'},'ข้อ')}}),
      e('br'),
      e(Button,{variant:'contained', color:'error', size:'large', startIcon:Sym('play_arrow',24),
        onClick:()=>{setSeed(s=>s+1);setStarted(true);setRound(0);setScore(0);setStreak(0);setDone(false);setPicked(null);}}, 'เริ่มทำข้อสอบ ('+count+' ข้อ)')
    );
  }
  if(done){
    const pct=Math.round(score/TOTAL*100);
    return e(Container,{maxWidth:'sm', sx:{py:6, textAlign:'center'}},
      e(Avatar,{sx:{bgcolor: pct>=60?'success.main':'error.main', width:80, height:80, mx:'auto', mb:2}}, Sym(pct>=60?'emoji_events':'replay',40)),
      e(Typography,{variant:'h4', fontWeight:700}, 'ได้ '+score+'/'+TOTAL),
      e(Typography,{color:'text.secondary', sx:{mb:1}}, pct>=60?'เยี่ยมมาก! ผ่านเกณฑ์':'สู้ๆ ลองอีกครั้งนะ'),
      e(LinearProgress,{variant:'determinate', value:pct, color:pct>=60?'success':'error', sx:{height:10, borderRadius:5, my:2}}),
      e(Stack,{direction:'row', spacing:1.5, justifyContent:'center'},
        e(Button,{variant:'outlined', startIcon:Sym('tune',20), onClick:()=>{setStarted(false);setDone(false);}}, 'เปลี่ยนจำนวนข้อ'),
        e(Button,{variant:'contained', color:'error', startIcon:Sym('replay',20), onClick:()=>{setSeed(s=>s+1);setRound(0);setScore(0);setStreak(0);setDone(false);setPicked(null);}}, 'ทำชุดใหม่'))
    );
  }
  const cur = quiz[round];
  const answer=(o)=>{
    if(picked!==null) return;
    setPicked(o.n);
    const ok = o.n===cur.correct.n;
    if(ok){ setScore(s=>s+1); setStreak(s=>s+1); setFx('ok'); beep('ok'); }
    else { setStreak(0); setFx('no'); beep('no'); }
    setTimeout(()=>{
      setPicked(null); setFx(null);
      if(round+1>=TOTAL) setDone(true); else setRound(r=>r+1);
    }, 900);
  };
  return e(Container,{maxWidth:'sm', sx:{py:4, position:'relative'}},

    e(Stack,{direction:'row', justifyContent:'space-between', alignItems:'center', sx:{mb:1}},

        e(Chip,{label:'คะแนน '+score, color:'success'}))),
    e(LinearProgress,{variant:'determinate', value:(round)/TOTAL*100, sx:{mb:3, height:8, borderRadius:5}}),

    e(Card,{variant:'outlined', sx:{my:2, textAlign:'center', py:3,

}

// ---------- PEN / ANNOTATION overlay (for teaching on iPad) ----------
function PenLayer({on, color, size, clearKey, undoKey}){
  const cv = React.useRef(null);
  const draw = React.useRef({down:false, pts:[]});
  const strokes = React.useRef([]); // history for undo: {color,size,pts}
  const fit = ()=>{ const c=cv.current; if(!c) return; const dpr=window.devicePixelRatio||1;
    c.width=window.innerWidth*dpr; c.height=window.innerHeight*dpr;
    c.style.width=window.innerWidth+'px'; c.style.height=window.innerHeight+'px';
    const ctx=c.getContext('2d'); ctx.setTransform(dpr,0,0,dpr,0,0); ctx.lineCap='round'; ctx.lineJoin='round';
    redraw();
  };
  const setStyle=(ctx,col,sz)=>{
    if(col==='hl'){ ctx.strokeStyle='rgba(250,204,21,0.45)'; ctx.lineWidth=sz*5; ctx.globalCompositeOperation='source-over'; }
    else if(col==='erase'){ ctx.globalCompositeOperation='destination-out'; ctx.lineWidth=sz*6; }
    else { ctx.strokeStyle=col; ctx.lineWidth=sz; ctx.globalCompositeOperation='source-over'; }
  };
  const drawStroke=(ctx,s)=>{ if(s.pts.length<1) return; setStyle(ctx,s.color,s.size);
    ctx.beginPath(); ctx.moveTo(s.pts[0].x,s.pts[0].y);
    for(let i=1;i<s.pts.length;i++){ const a=s.pts[i-1],b=s.pts[i]; ctx.quadraticCurveTo(a.x,a.y,(a.x+b.x)/2,(a.y+b.y)/2); }
    ctx.stroke();
  };
  const redraw=()=>{ const c=cv.current; if(!c) return; const ctx=c.getContext('2d');
    ctx.save(); ctx.setTransform(1,0,0,1,0,0); ctx.clearRect(0,0,c.width,c.height); ctx.restore();
    strokes.current.forEach(s=>drawStroke(ctx,s));
  };
  useEffect(()=>{ if(on){ fit(); window.addEventListener('resize',fit);} return ()=>window.removeEventListener('resize',fit); },[on]);
  useEffect(()=>{ strokes.current=[]; redraw(); },[clearKey]);
  useEffect(()=>{ if(undoKey>0){ strokes.current.pop(); redraw(); } },[undoKey]);
  if(!on) return null;
  const pos=(ev)=>{ const r=cv.current.getBoundingClientRect();
    // pressure: stylus gives 0..1; mouse/touch report 0 or 0.5 → treat as 1 (uniform)
    let pr = ev.pressure; if(ev.pointerType!=='pen' || !pr) pr = 1;
    return {x:ev.clientX-r.left, y:ev.clientY-r.top, p:pr}; };
  const segWidth=(pr)=> color==='hl'||color==='erase' ? size : Math.max(size*0.45, size*(0.5+pr)); // pressure → width for pen
  const start=(ev)=>{ ev.preventDefault(); cv.current.setPointerCapture?.(ev.pointerId); const p=pos(ev); draw.current={down:true, pts:[p]}; };
  const move=(ev)=>{ if(!draw.current.down) return; ev.preventDefault();
    const ctx=cv.current.getContext('2d');
    // coalesced events = all sub-frame points → smooth fast strokes (world-class technique)
    const evs = ev.getCoalescedEvents ? ev.getCoalescedEvents() : [ev];
    evs.forEach(ce=>{ const p=pos(ce); const pts=draw.current.pts; const a=pts[pts.length-1];
      if(a){ setStyle(ctx,color,size); ctx.lineWidth=segWidth(p.p);
        ctx.beginPath(); ctx.moveTo(a.x,a.y);
        const mx=(a.x+p.x)/2, my=(a.y+p.y)/2; ctx.quadraticCurveTo(a.x,a.y,mx,my); ctx.lineTo(p.x,p.y); ctx.stroke(); }
      pts.push(p);
    }); };
  const end=()=>{ if(draw.current.down && draw.current.pts.length){ strokes.current.push({color,size,pts:draw.current.pts}); } draw.current={down:false,pts:[]}; };
  return e('canvas',{ref:cv,
    onPointerDown:start, onPointerMove:move, onPointerUp:end, onPointerCancel:end,
    style:{position:'fixed', inset:0, zIndex:1290, touchAction:'none', cursor:'crosshair'}});
}

function PenToolbar({penOn, setPenOn, color, setColor, size, setSize, onClear, onUndo}){
  const colors=[['#dc2626','แดง'],['#2563eb','น้ำเงิน'],['#16a34a','เขียว'],['#111827','ดำ'],['hl','ปากกาเน้น']];
  const widths=[[2,'บาง'],[4,'กลาง'],[7,'หนา']];
  const dot=(c)=>c==='hl'?'rgba(250,204,21,0.6)':(c==='erase'?'#e5e7eb':c);
  return e(Box,{sx:{position:'fixed', right:16, bottom:16, zIndex:1300, display:'flex', flexDirection:'column', alignItems:'flex-end', gap:1}},
    penOn ? e(Paper,{elevation:8, sx:{p:1, borderRadius:3, display:'flex', flexDirection:'column', gap:0.75, alignItems:'center'}},
      ...colors.map(([c,label])=>e(Tooltip,{key:c, title:label, placement:'left'},
        e(IconButton,{size:'small', onClick:()=>setColor(c),
          sx:{border: color===c?'3px solid':'2px solid transparent', borderColor: color===c?'primary.main':'transparent', p:0.5}},
          e(Box,{sx:{width:18, height:18, borderRadius:'50%', bgcolor:dot(c),
            display:'flex', alignItems:'center', justifyContent:'center'}},
            c==='hl'? e('span',{className:'ms',style:{fontSize:13,color:'#854d0e'}},'edit') : null) ))),
      e(Divider,{flexItem:true, sx:{my:0.25}}),
      // widths
      ...widths.map(([w,label])=>e(Tooltip,{key:w, title:'เส้น'+label, placement:'left'},
        e(IconButton,{size:'small', onClick:()=>setSize(w),
          sx:{border: size===w?'3px solid':'2px solid transparent', borderColor: size===w?'primary.main':'transparent', p:0.5}},
          e(Box,{sx:{width:18, height:18, display:'flex', alignItems:'center', justifyContent:'center'}},
            e(Box,{sx:{width:16, height:w, borderRadius:5, bgcolor:'text.primary'}}) )))),
      e(Divider,{flexItem:true, sx:{my:0.25}}),
      e(Tooltip,{title:'ยางลบ', placement:'left'}, e(IconButton,{size:'small', onClick:()=>setColor('erase'),
        sx:{border: color==='erase'?'3px solid':'2px solid transparent', borderColor:color==='erase'?'primary.main':'transparent'}}, Sym('ink_eraser',20))),
      e(Tooltip,{title:'ย้อนกลับ (undo)', placement:'left'}, e(IconButton,{size:'small', onClick:onUndo}, Sym('undo',20))),
      e(Tooltip,{title:'ล้างทั้งหมด', placement:'left'}, e(IconButton,{size:'small', color:'error', onClick:onClear}, Sym('delete_sweep',20)))
    ) : null,
    e(Tooltip,{title: penOn?'ปิดโหมดปากกา':'เปิดโหมดปากกา (เขียนบนจอ)', placement:'left'},
      e(IconButton,{onClick:()=>setPenOn(p=>!p), sx:{bgcolor: penOn?'error.main':'primary.main', color:'#fff', width:56, height:56, boxShadow:4, '&:hover':{bgcolor: penOn?'error.dark':'primary.dark'}}},
        Sym(penOn?'close':'edit',26)))
  );
}
